# Saa9vi multi-tenant storefront — nginx + njs reverse proxy config
#
# Requires the njs module. On Debian/Ubuntu:
#   apt install libnginx-mod-http-js
# and in nginx.conf (top level, outside any http{}/server{} block):
#   load_module modules/ngx_http_js_module.so;
#
# See resolve_channel.js for the actual resolution logic and the
# security note on why the header is always overwritten unconditionally.

# Path is relative to nginx's configured js_path, or absolute.
js_import resolve_channel from resolve_channel.js;

upstream storefront {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name academy-a.example.com academy-b.example.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    # njs needs this variable pre-declared before resolve_channel.js can
    # assign to it via r.variables.channel_token.
    js_var $channel_token "";

    # Internal-only endpoint the subrequest in resolve_channel.js hits.
    # Not reachable directly from outside — `internal;` enforces that.
    location = /_resolve_channel_internal {
        internal;
        proxy_pass http://storefront/api/resolve-channel;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # Fail fast: if the storefront/Redis is slow or down, don't let
        # every request on the site hang waiting on this subrequest.
        # A timeout here still reaches resolve_channel.js's callback with
        # a non-200 reply, which resolves to $channel_token = '' —
        # i.e. this fails open to "no tenant resolved", not to a hang.
        proxy_connect_timeout 300ms;
        proxy_read_timeout 300ms;
    }

    # Entry point for real traffic: resolve the channel token via JS,
    # then internally redirect to @storefront below with the result set.
    location / {
        js_content resolve_channel.resolveChannel;
    }

    location @storefront {
        # Unconditional overwrite — see resolve_channel.js's header note.
        proxy_set_header X-Saa9vi-Channel-Token $channel_token;

        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Marketplace (cross-tenant, no channel resolution needed — served as-is).
server {
    listen 443 ssl http2;
    server_name marketplace.saa9vi.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    location / {
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Deliberately no X-Saa9vi-Channel-Token here — marketplaceSearch
        # is cross-tenant by design (see queryPublic() in lib/vendure/api.ts).
    }
}
